version: "3.9"

services:
  users-db:
    image: postgres:16
    container_name: users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: ${USERS_DB_USER}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - users_data:/var/lib/postgresql/data

  users-service:
    build: ./backend/users-service
    container_name: users-service
    environment:
      DATABASE_URL: postgresql://${USERS_DB_USER}:${USERS_DB_PASSWORD}@users-db:5432/users_db
    ports:
      - "8001:8000"
    volumes:
      - ./backend/users-service:/app  
    depends_on:
      users-db:
        condition: service_started

  orders-db:
    image: postgres:16
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - orders_data:/var/lib/postgresql/data

  orders-service:
    build: ./backend/orders-service
    container_name: orders-service
    environment:
      DATABASE_URL: postgresql://${ORDERS_DB_USER}:${ORDERS_DB_PASSWORD}@orders-db:5432/orders_db
    ports:
      - "8002:8000"
    volumes:
      - ./backend/orders-service:/app
    depends_on:
      orders-db:
        condition: service_started

# ========================
# FRONTEND (NOVO)
# ========================

  shell:
    build: ./frontend/shell
    container_name: shell
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/shell:/app
      - shell_node_modules:/app/node_modules
    ports:
      - "9000:9000"

  orders-mfe:
    build: ./frontend/orders-mfe
    container_name: orders-mfe
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/orders-mfe:/app
      - orders_mfe_node_modules:/app/node_modules
    ports:
      - "8500:8500"

volumes:
  users_data:
  orders_data:
  shell_node_modules:
  orders_mfe_node_modules: