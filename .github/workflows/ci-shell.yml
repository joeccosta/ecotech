name: CI shell

on:
  push:
    branches: [main]
    paths:
      - "frontend/shell/**"
      - ".github/workflows/ci-shell.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/shell/**"
      - ".github/workflows/ci-shell.yml"

jobs:
  build-shell:
    name: Build shell
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/shell

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/shell/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Show TypeScript version
        run: npx tsc -v

      - name: Build shell
        run: npm run build
